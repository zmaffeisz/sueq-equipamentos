<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Secretaria da Saúde · Sorocaba</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
<button id="tema-btn" onclick="alternarTema()" class="tema-btn" aria-label="Alternar tema" style="position:fixed;top:16px;right:16px;z-index:100">
  <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
</button>
<div class="login-card">
  <div class="login-logo">
    <div style="font-size:34px;line-height:1;margin-bottom:.5rem">🏥</div>
    <div class="login-logo-title">Secretaria da Saúde · Sorocaba</div>
    <div class="login-logo-sub">Sistema de Gestão — SUEQ</div>
  </div>
  <div class="form-group">
    <label class="login-label">E-mail</label>
    <input type="email" class="login-input" id="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="form-group">
    <label class="login-label">Senha</label>
    <input type="password" class="login-input" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="login-btn" id="btn-login" onclick="login()">Entrar</button>
  <div class="login-error" id="error-msg"></div>
  <div style="text-align:center;margin-top:.875rem">
    <a href="cadastro.html" style="font-size:13px;color:var(--accent);text-decoration:none">Não tem conta? Criar acesso</a>
  </div>
  <div class="login-footer">Secretaria Municipal da Saúde</div>
</div>

<script>
function aplicarTema(t){document.documentElement.dataset.theme=t;try{localStorage.setItem('tema',t);}catch(e){}}
function alternarTema(){aplicarTema(document.documentElement.dataset.theme==='dark'?'light':'dark');}
aplicarTema((function(){try{return localStorage.getItem('tema');}catch(e){return null;}})()||'dark');
</script>
<script>
const SUPABASE_URL = "https://qpvgpfwuurqcqprnpxua.supabase.co";
const SUPABASE_KEY = "sb_publishable_SisbCbcyd-MFrIqvYSQZ8A_eaVaepNp";
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
  const email=document.getElementById("email").value.trim();
  const senha=document.getElementById("senha").value;
  const btn=document.getElementById("btn-login");
  const err=document.getElementById("error-msg");
  if(!email||!senha){err.textContent="Preencha e-mail e senha.";err.style.display="block";return}
  btn.disabled=true;btn.textContent="Entrando...";err.style.display="none";
  const {data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){
    err.textContent=error.message==="Invalid login credentials"?"E-mail ou senha incorretos.":error.message;
    err.style.display="block";
    btn.disabled=false;btn.textContent="Entrar";
    return;
  }
  // Redirecionar para o dashboard
  window.location.href="index.html";
}

// Se já está logado, redireciona direto
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href="index.html";
});
</script>
</body>
</html>
